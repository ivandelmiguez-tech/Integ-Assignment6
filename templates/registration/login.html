{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block content %}
<div class="auth-layout">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="auth-subtitle">Sign in to view your albums and upload photos.</p>
    <form method="post" novalidate>
      {% csrf_token %}
      {% include "partials/form_fields.html" %}
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Sign in</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{% url 'signup' %}">Create one free</a></p>
  </div>
</div>
{% endblock %}
