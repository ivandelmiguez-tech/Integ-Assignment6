{% extends "base.html" %}
{% block title %}Create account{% endblock %}
{% block content %}
<div class="auth-layout">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="auth-subtitle">Join in seconds and start organizing your photo albums.</p>
    <form method="post" novalidate>
      {% csrf_token %}
      {% include "partials/form_fields.html" %}
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Create account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
  </div>
</div>
{% endblock %}
